services:
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/generated_assets:/app/generated_assets
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    env_file: .env
    ports:
      - "8501:8501"
    depends_on:
      - backend

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: hebrekraft
      POSTGRES_PASSWORD: hebrekraft
      POSTGRES_DB: hebrekraft
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
